<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Portal Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: Inter, system-ui, sans-serif; }</style>
</head>
<body class="bg-navy-50 text-navy-800 antialiased">
  <div class="min-h-screen flex flex-col">
    <header class="bg-navy text-white px-4 py-3 flex items-center justify-between shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-teal/20 flex items-center justify-center">
          <svg class="w-4 h-4 text-teal-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/></svg>
        </div>
        <div>
          <p class="text-sm font-semibold">PackRight Customer Portal</p>
          <p class="text-xs text-navy-300">Demo · Meridian Foods Inc.</p>
        </div>
      </div>
      <span class="text-xs bg-teal/20 text-teal-200 px-2 py-1 rounded-full">Live demo data</span>
    </header>

    <div class="flex flex-1 min-h-0">
      <aside class="hidden sm:block w-56 bg-white border-r border-navy-100 p-4 shrink-0">
        <p class="text-xs font-semibold text-navy-400 uppercase tracking-wider mb-3">Navigation</p>
        <nav class="space-y-1 text-sm">
          <button type="button" class="nav-view w-full text-left px-3 py-2 rounded-lg bg-teal-50 text-teal-700 font-medium" data-view="orders">Orders</button>
          <button type="button" class="nav-view w-full text-left px-3 py-2 rounded-lg text-navy-600 hover:bg-navy-50" data-view="proofs">Proofs</button>
          <button type="button" class="nav-view w-full text-left px-3 py-2 rounded-lg text-navy-600 hover:bg-navy-50" data-view="shipments">Shipments</button>
        </nav>
      </aside>

      <main class="flex-1 p-4 sm:p-6 overflow-auto">
        <div id="list-view">
          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-5">
            <div>
              <h1 class="text-lg font-bold text-navy" id="view-title">Your orders</h1>
              <p class="text-sm text-navy-500">Real-time status synced from production</p>
            </div>
            <input type="search" id="search-input" placeholder="Search PO or SKU…" class="px-3 py-2 text-sm border border-navy-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-teal/30 w-full sm:w-64" />
          </div>

          <div class="flex flex-wrap gap-2 mb-4" id="status-filters">
            <button type="button" class="filter-btn px-3 py-1 text-xs font-medium rounded-full bg-navy text-white" data-filter="all">All</button>
            <button type="button" class="filter-btn px-3 py-1 text-xs font-medium rounded-full bg-white border border-navy-200 text-navy-600" data-filter="proof">Proof pending</button>
            <button type="button" class="filter-btn px-3 py-1 text-xs font-medium rounded-full bg-white border border-navy-200 text-navy-600" data-filter="production">In production</button>
            <button type="button" class="filter-btn px-3 py-1 text-xs font-medium rounded-full bg-white border border-navy-200 text-navy-600" data-filter="shipped">Shipped</button>
          </div>

          <div class="bg-white rounded-xl border border-navy-100 overflow-hidden shadow-soft">
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="bg-navy-50 text-navy-500 text-xs uppercase tracking-wider">
                  <tr>
                    <th class="text-left px-4 py-3 font-semibold">Order</th>
                    <th class="text-left px-4 py-3 font-semibold">Product</th>
                    <th class="text-left px-4 py-3 font-semibold">Qty</th>
                    <th class="text-left px-4 py-3 font-semibold">Status</th>
                    <th class="text-left px-4 py-3 font-semibold">Ship date</th>
                  </tr>
                </thead>
                <tbody id="orders-table"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div id="detail-view" class="hidden">
          <button type="button" id="back-btn" class="text-sm text-teal font-medium mb-4 hover:underline">&larr; Back to orders</button>
          <div class="bg-white rounded-xl border border-navy-100 p-5 shadow-soft" id="order-detail"></div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const ORDERS = [
      { id: 'PO-7842', sku: 'CRB-12-KRAFT', product: '12oz Kraft Corrugated Box', qty: 5000, status: 'production', shipDate: 'Jul 8, 2026', customer: 'Meridian Foods', proof: 'Approved Jun 20', timeline: ['Order received Jun 12', 'Proof sent Jun 18', 'Proof approved Jun 20', 'Production started Jun 24', 'QC passed — awaiting ship'] },
      { id: 'PO-7831', sku: 'LBL-4X6-POLY', product: '4×6 Poly Produce Label', qty: 12000, status: 'proof', shipDate: 'Jul 12, 2026', customer: 'Meridian Foods', proof: 'Awaiting your review', timeline: ['Order received Jun 22', 'Proof sent Jun 26 — action needed'] },
      { id: 'PO-7819', sku: 'SHR-24-BUNDLE', product: '24-pack Shrink Bundle', qty: 8000, status: 'shipped', shipDate: 'Jun 24, 2026', customer: 'Meridian Foods', proof: 'Approved Jun 10', timeline: ['Order received Jun 1', 'Proof approved Jun 10', 'Production Jun 14–18', 'Shipped Jun 24 — FedEx #7829100456'] },
      { id: 'PO-7805', sku: 'TRY-6CELL', product: '6-cell Berry Tray', qty: 15000, status: 'production', shipDate: 'Jul 5, 2026', customer: 'Meridian Foods', proof: 'Approved Jun 15', timeline: ['Order received Jun 8', 'Proof approved Jun 15', 'Die cut complete Jun 23', 'Assembly in progress'] },
      { id: 'PO-7798', sku: 'CRB-16-WHITE', product: '16oz White Corrugated Box', qty: 3200, status: 'proof', shipDate: 'Jul 15, 2026', customer: 'Meridian Foods', proof: 'Revision 2 sent', timeline: ['Order received Jun 18', 'Proof v1 rejected Jun 22', 'Proof v2 sent Jun 25 — awaiting review'] },
      { id: 'PO-7784', sku: 'INS-FP-100', product: 'Food-safe Insert Pad', qty: 20000, status: 'shipped', shipDate: 'Jun 18, 2026', customer: 'Meridian Foods', proof: 'Approved Jun 5', timeline: ['Order received May 28', 'Shipped Jun 18 — delivered Jun 20'] },
    ];

    const STATUS_LABELS = {
      proof: { text: 'Proof pending', class: 'bg-amber-100 text-amber-800' },
      production: { text: 'In production', class: 'bg-blue-100 text-blue-800' },
      shipped: { text: 'Shipped', class: 'bg-teal-100 text-teal-800' },
    };

    let activeFilter = 'all';
    let searchQuery = '';
    let currentView = 'orders';

    const ordersTable = document.getElementById('orders-table');
    const listView = document.getElementById('list-view');
    const detailView = document.getElementById('detail-view');
    const viewTitle = document.getElementById('view-title');

    function filteredOrders() {
      return ORDERS.filter((o) => {
        const matchFilter = activeFilter === 'all' || o.status === activeFilter;
        const q = searchQuery.toLowerCase();
        const matchSearch = !q || o.id.toLowerCase().includes(q) || o.sku.toLowerCase().includes(q) || o.product.toLowerCase().includes(q);
        const matchView =
          currentView === 'orders' ||
          (currentView === 'proofs' && o.status === 'proof') ||
          (currentView === 'shipments' && o.status === 'shipped');
        return matchFilter && matchSearch && matchView;
      });
    }

    function renderTable() {
      const rows = filteredOrders();
      ordersTable.innerHTML = rows.length
        ? rows.map((o) => {
            const st = STATUS_LABELS[o.status];
            return `<tr class="border-t border-navy-50 hover:bg-navy-50/50 cursor-pointer order-row" data-id="${o.id}">
              <td class="px-4 py-3 font-medium text-navy">${o.id}</td>
              <td class="px-4 py-3"><span class="block">${o.product}</span><span class="text-xs text-navy-400">${o.sku}</span></td>
              <td class="px-4 py-3">${o.qty.toLocaleString()}</td>
              <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-medium ${st.class}">${st.text}</span></td>
              <td class="px-4 py-3 text-navy-600">${o.shipDate}</td>
            </tr>`;
          }).join('')
        : `<tr><td colspan="5" class="px-4 py-8 text-center text-navy-400">No orders match your filters.</td></tr>`;

      document.querySelectorAll('.order-row').forEach((row) => {
        row.addEventListener('click', () => showDetail(row.dataset.id));
      });
    }

    function showDetail(id) {
      const order = ORDERS.find((o) => o.id === id);
      if (!order) return;
      const st = STATUS_LABELS[order.status];
      document.getElementById('order-detail').innerHTML = `
        <div class="flex flex-wrap items-start justify-between gap-3 mb-5">
          <div>
            <h2 class="text-xl font-bold text-navy">${order.id}</h2>
            <p class="text-sm text-navy-500">${order.product} · ${order.sku}</p>
          </div>
          <span class="px-3 py-1 rounded-full text-xs font-medium ${st.class}">${st.text}</span>
        </div>
        <div class="grid sm:grid-cols-3 gap-4 mb-6">
          <div class="bg-navy-50 rounded-lg p-3"><p class="text-xs text-navy-400">Quantity</p><p class="font-semibold">${order.qty.toLocaleString()} units</p></div>
          <div class="bg-navy-50 rounded-lg p-3"><p class="text-xs text-navy-400">Est. ship</p><p class="font-semibold">${order.shipDate}</p></div>
          <div class="bg-navy-50 rounded-lg p-3"><p class="text-xs text-navy-400">Proof status</p><p class="font-semibold">${order.proof}</p></div>
        </div>
        <h3 class="text-sm font-semibold text-navy mb-3">Order timeline</h3>
        <ol class="space-y-2">${order.timeline.map((t, i) => `
          <li class="flex gap-3 text-sm">
            <span class="w-5 h-5 rounded-full ${i === order.timeline.length - 1 ? 'bg-teal text-white' : 'bg-navy-200 text-navy-600'} flex items-center justify-center text-xs shrink-0">${i + 1}</span>
            <span class="text-navy-600">${t}</span>
          </li>`).join('')}</ol>
        ${order.status === 'proof' ? `<button type="button" class="mt-5 px-4 py-2 bg-teal text-white text-sm font-medium rounded-lg hover:bg-teal-700">Review proof</button>` : ''}`;
      listView.classList.add('hidden');
      detailView.classList.remove('hidden');
    }

    document.getElementById('back-btn').addEventListener('click', () => {
      detailView.classList.add('hidden');
      listView.classList.remove('hidden');
    });

    document.getElementById('search-input').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderTable();
    });

    document.querySelectorAll('.filter-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        activeFilter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach((b) => {
          b.className = 'filter-btn px-3 py-1 text-xs font-medium rounded-full bg-white border border-navy-200 text-navy-600';
        });
        btn.className = 'filter-btn px-3 py-1 text-xs font-medium rounded-full bg-navy text-white';
        renderTable();
      });
    });

    document.querySelectorAll('.nav-view').forEach((btn) => {
      btn.addEventListener('click', () => {
        currentView = btn.dataset.view;
        document.querySelectorAll('.nav-view').forEach((b) => {
          b.className = 'nav-view w-full text-left px-3 py-2 rounded-lg text-navy-600 hover:bg-navy-50';
        });
        btn.className = 'nav-view w-full text-left px-3 py-2 rounded-lg bg-teal-50 text-teal-700 font-medium';
        const titles = { orders: 'Your orders', proofs: 'Proofs awaiting review', shipments: 'Recent shipments' };
        viewTitle.textContent = titles[currentView];
        detailView.classList.add('hidden');
        listView.classList.remove('hidden');
        renderTable();
      });
    });

    renderTable();
  </script>
</body>
</html>
